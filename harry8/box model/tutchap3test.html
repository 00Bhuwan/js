<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box1{
            background-color: red;
            margin: 30px;
            height: 30px;
        }
        .box2{
            background-color: blue;
            margin: 20px;
            /* This margin collapse as its less than 30px from box1 */
            height: 30px;
        }
    </style>
</head>
<body>
    <h3>Margin Collapse</h3>
    <div class="box1">when two margins from different elements overlap the 
    equivalent margin is the greater of the two. this is called marign collapse.
    </div>
    <div class="box2">Another box to display margin collapse.</div>

    
</body>
</html>
